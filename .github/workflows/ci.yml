name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version is read from package.json "packageManager" (single source of truth).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --filter guideway --no-frozen-lockfile
      - run: pnpm --filter guideway typecheck
      - run: pnpm --filter guideway test -- --coverage --ci
